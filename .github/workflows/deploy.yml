name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Avoid two deploys racing against the same CloudFormation stack.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required to assume the AWS role via OIDC (no static keys)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            infra/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        # VITE_API_BASE_URL only takes effect once ACM_CERTIFICATE_ARN is set
        # (see cdk deploy step below) — until then this stays empty and the
        # frontend keeps calling the same-origin '/api' as before.
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.ACM_CERTIFICATE_ARN && 'https://api.quienquieresercolombiano.com/api' || '' }}

      - name: Verify Lambda cross-compiles (linux/arm64)
        run: make lambda-build

      - name: Install CDK dependencies
        run: npm ci
        working-directory: infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: cdk deploy
        # Domain context is only passed once ACM_CERTIFICATE_ARN exists (see
        # README "Dominio propio (Cloudflare)"); until then the stack deploys
        # with its default CloudFront/API Gateway domains.
        run: |
          CONTEXT_ARGS=()
          if [ -n "${{ secrets.ACM_CERTIFICATE_ARN }}" ]; then
            CONTEXT_ARGS=(
              -c siteDomainNames=quienquieresercolombiano.com,www.quienquieresercolombiano.com
              -c apiDomainName=api.quienquieresercolombiano.com
              -c certificateArn="${{ secrets.ACM_CERTIFICATE_ARN }}"
            )
          fi
          npx cdk deploy --require-approval never "${CONTEXT_ARGS[@]}"
        working-directory: infra
